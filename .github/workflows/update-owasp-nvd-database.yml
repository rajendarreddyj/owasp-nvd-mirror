name: Update OWASP NVD Database

on:
  schedule:
    - cron: '0 2 * * 1'  
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24

jobs:
  update-nvd:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    permissions:
      contents: write
    environment:
      name: GithubEnvironment  
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

      - name: Restore NVD database cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/dc-data
          key: owasp-nvd-data-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: |
            owasp-nvd-data-${{ runner.os }}-

      - name: Download/Update NVD Database
        run: |
          mkdir -p empty-scan
          mvn org.owasp:dependency-check-maven:check \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            -DnvdApiDelay=500 \
            -DfailBuildOnCVSS=11 \
            -DdataDirectory=${{ github.workspace }}/owasp-dc-data \
            -Dscan=${{ github.workspace }}/empty-scan

      - name: Save NVD database cache
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/owasp-dc-data
          key: owasp-nvd-data-${{ runner.os }}-${{ steps.date.outputs.date }}

      - name: Compress database
        run: tar -czf owasp-nvd-database.tar.gz -C ${{ github.workspace }} owasp-dc-data

      - name: Create or update Release
        run: |
          gh release delete owasp-nvd-data-latest --yes 2>/dev/null || true
          gh release create owasp-nvd-data-latest \
            --title "NVD Database Latest" \
            --notes "Updated at ${{ github.run_id }}" \
            owasp-nvd-database.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
